[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maestro-humming-detector"
version = "0.1.1"
description = "Humming transcription support for Maestro."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Kashi Tuteja" },
  { name = "Arthur Gilfanov" },
  { name = "Matthew Li" },
]
dependencies = [
  "librosa>=0.11,<1",
  "numpy>=1.26,<3",
  "sounddevice>=0.4,<1",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
